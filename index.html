n" content="Start with a blank project."><meta name="twitter:description" content="Start with a blank project."><script crossorigin="anonymous" src="./external/runtime/runtime.js"></script><script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam"></script></head><body><style>
#tap-overlay{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);transition:opacity .35s}
#tap-overlay svg{animation:pulse 1.6s ease-in-out infinite}

<div id="tap-overlay">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 11V6a2 2 0 0 0-4 0v5"/><path d="M14 10V4a2 2 0 0 0-4 0v6"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M6 14v1a6 6 0 0 0 12 0v-3a2 2 0 0 0-4 0"/>
  </svg>
  <p>화면을 터치해주세요</p>
</div>
<script>
(function(){
  var overlay = document.getElementById('tap-overlay');
  var unlocked = false;
  function unlock(){
    if(unlocked) return;
    unlocked = true;
    try{
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.resume().then(function(){ ctx.close(); });
    }catch(e){}
    document.querySelectorAll('video').forEach(function(v){ v.muted = false; });
    overlay.style.opacity = '0';
    setTimeout(function(){ overlay.style.display = 'none'; }, 350);
  }
  document.addEventListener('touchstart', unlock, {once:true, capture:true});
  document.addEventListener('click',      unlock, {once:true, capture:true});
})();
</script>
